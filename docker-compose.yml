version: '3.9'

services:
  backend:
    build:
      context: ./backend
    container_name: inventory_backend
    ports:
      - "3001:3001"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: inventory_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped